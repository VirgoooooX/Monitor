appId: com.monitor.desktop
productName: Monitor

directories:
  output: release

files:
  - dist/**/*

extraResources:
  - from: build/tray-icon.png
    to: tray-icon.png

npmRebuild: true
forceCodeSigning: false

win:
  target: nsis
  icon: build/icon.ico
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
