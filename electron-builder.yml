appId: com.monitor.desktop
productName: Monitor

directories:
  output: release

afterPack: scripts/after-pack-icon.cjs

files:
  - dist/**/*

extraResources:
  - from: build/tray-icon.png
    to: tray-icon.png
  - from: build/icon.ico
    to: icon.ico

npmRebuild: true
forceCodeSigning: false

win:
  target: nsis
  icon: build/icon.ico
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
