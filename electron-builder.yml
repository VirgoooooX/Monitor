appId: com.monitor.desktop
productName: Monitor

directories:
  output: release

afterPack: scripts/after-pack-icon.cjs

files:
  - dist/**/*

extraResources:
  - from: build/tray-icon.png
    to: tray-icon.png
  - from: build/tray-iconTemplate.png
    to: tray-iconTemplate.png
  - from: build/tray-iconTemplate@2x.png
    to: tray-iconTemplate@2x.png

npmRebuild: true
forceCodeSigning: false

win:
  target: nsis
  icon: build/icon.ico
  # Keep rcedit-driven exe metadata edits (icon, version info) ON,
  # but force `forceCodeSigning: false` to ensure unsigned builds
  # still succeed. The taskbar icon comes from the exe's embedded
  # icon resource — without rcedit running, Windows falls back to
  # Electron's default atom icon. electron-builder bundles its own
  # rcedit copy and pulls the winCodeSign cache automatically when
  # this flag is true, so CI runners no longer need a pre-populated
  # cache.
  signAndEditExecutable: true
  # Windows needs icon.ico at process.resourcesPath for
  # `resolveWindowIconPath()` (see src/main/windows.ts). macOS uses
  # the auto-placed icon.icns from `mac.icon` and never reads icon.ico,
  # so we keep this win-scoped to avoid duplicate-write EEXIST on the
  # macOS afterPack hook.
  extraResources:
    - from: build/icon.ico
      to: icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: null
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  extendInfo:
    LSUIElement: true
    LSMinimumSystemVersion: "11.0"
